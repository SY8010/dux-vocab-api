kind = "mobile"
previewPath = "/"
title = "DUX Vocabulary Test"
version = "1.0.0"
id = "artifacts/dux-vocab"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19830

[services.development]
run = "pnpm --filter @workspace/dux-vocab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dux-vocab", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dux-vocab", "run", "serve" ]

[services.env]
PORT = "19830"
BASE_PATH = "/"
